changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: "🚀 New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "⚡ Performance"
      labels:
        - performance
        - optimization
    - title: "🔧 Maintenance"
      labels:
        - chore
        - ci
        - refactor
    - title: "🔒 Security"
      labels:
        - security
