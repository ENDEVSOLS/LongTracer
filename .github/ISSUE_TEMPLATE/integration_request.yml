name: Integration Request
description: Request support for a new framework or backend
labels: ["enhancement", "integration"]
body:
  - type: markdown
    attributes:
      value: |
        Request a new framework adapter (Haystack, CrewAI, etc.) or storage backend.

  - type: input
    id: framework
    attributes:
      label: Framework / Library Name
      placeholder: "e.g. Haystack, CrewAI, AutoGen"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Framework Version
      placeholder: "e.g. 2.0"

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: How would you use LongTracer with this framework?
    validations:
      required: true

  - type: textarea
    id: docs
    attributes:
      label: Relevant Documentation
      description: Links to the framework's callback/event system docs.
