site_name: LongTracer
site_description: RAG hallucination detection — detect contradictions in LLM responses using hybrid STS + NLI
site_url: https://endevsols.github.io/LongTracer
repo_url: https://github.com/ENDEVSOLS/LongTracer
repo_name: ENDEVSOLS/LongTracer
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - How It Works: how-it-works.md
  - Integrations:
    - LangChain: integrations/langchain.md
    - LlamaIndex: integrations/llamaindex.md
    - Direct API: integrations/direct-api.md
  - Trace Storage:
    - Backends: backends.md
  - CLI Reference: cli.md
  - API Reference: api-reference.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ENDEVSOLS/LongTracer
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/longtracer/
